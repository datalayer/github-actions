name: tests

on:
  push:
    paths:
      - "src/**"
      - "tests/**"
      - "action.yml"
      - ".github/workflows/tests.yml"
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "action.yml"
      - ".github/workflows/tests.yml"
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest

      - name: Run unit tests
        run: pytest -q
